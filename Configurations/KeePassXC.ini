[General]
ConfigVersion=2
DropToBackgroundOnCopy=true
HideWindowOnCopy=true
MinimizeOnCopy=false
MinimizeOnOpenUrl=true
UpdateCheckMessageShown=true

[Browser]
CustomProxyLocation=
Enabled=true

[GUI]
TrayIconAppearance=monochrome

[KeeShare]
Active="<?xml version=\"1.0\"?><KeeShare><Active/></KeeShare>\n"
QuietSuccess=true

[PasswordGenerator]
AdditionalChars=
AdvancedMode=true
Dashes=true
ExcludedChars=
Length=60
Logograms=true
Math=true
Punctuation=true
Quotes=true

[Security]
ClearClipboardTimeout=60
EnableCopyOnDoubleClick=true
